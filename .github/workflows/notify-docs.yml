name: notify-docs

# When the plugin manifest SCHEMA (the source docs generates its plugin reference
# from) changes on main, ping docs.paged.media to rebuild (repository_dispatch:
# source-updated). Path-filtered to the exact file docs consumes. Nightly is the
# backstop. Needs DOCS_DISPATCH_TOKEN (Contents:write on paged-media/docs; org
# secret recommended); unset → skip.
on:
  push:
    branches: [main]
    paths:
      - "packages/plugin-api/src/manifest.schema.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping docs to rebuild (manifest schema changed)
        env:
          DOCS_DISPATCH_TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DOCS_DISPATCH_TOKEN" ]; then
            echo "DOCS_DISPATCH_TOKEN unset — skipping the docs rebuild ping."; exit 0
          fi
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DOCS_DISPATCH_TOKEN" \
            https://api.github.com/repos/paged-media/docs/dispatches \
            -d "{\"event_type\":\"source-updated\",\"client_payload\":{\"repo\":\"plugin-sdk\",\"reason\":\"manifest-schema\",\"sha\":\"${GITHUB_SHA}\"}}"
