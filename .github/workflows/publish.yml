# Canary publish via OIDC TRUSTED PUBLISHING (tokenless). No NPM_TOKEN: the
# runner mints a short-lived OIDC token (id-token: write) that npm trusts because
# each package has this repo+workflow configured as a Trusted Publisher on npmjs.
#
# Why pnpm pack → npm publish: OIDC trusted publishing is an npm-CLI feature
# (>= 11.5.1), while `pnpm pack` is what converts workspace:* deps + applies
# publishConfig. So we pack with pnpm (correct tarball) and upload with npm (OIDC).
#
# Pre-1.0: every version is a -canary.N prerelease under the `canary` dist-tag.
# Unchanged versions skip; bump a package's version to release it.
#
# One-time npm setup per package (plugin-api, plugin-sdk, plugin-cli):
#   npmjs.com → package → Trusted Publisher → GitHub Actions →
#     org: paged-media, repo: plugin-sdk, workflow: publish.yml, action: npm publish
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token for trusted publishing
  contents: read

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # >= 22.14 required for OIDC trusted publishing
      - name: upgrade npm (OIDC needs >= 11.5.1)
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - name: wire vendoring lockstep (hard gate)
        run: |
          set -e
          WIRE=packages/plugin-api/src/wire.d.ts
          VER=$(sed -n 's#^// Synced from @paged-media/canvas-wasm@##p' "$WIRE")
          test -n "$VER" || { echo "wire.d.ts has no version stamp"; exit 1; }
          echo "vendored wire stamped @paged-media/canvas-wasm@$VER"
          mkdir -p .wire-src
          printf '{"name":"wire-src-scratch","private":true}' > .wire-src/package.json
          ( cd .wire-src && npm install "@paged-media/canvas-wasm@$VER" --no-audit --no-fund --no-package-lock )
          PAGED_CANVAS_WASM_FROM="$PWD/.wire-src" node scripts/sync-wire.mjs --check
      - run: pnpm -r build   # produce dist (pnpm pack does NOT run prepublishOnly)
      - name: publish changed versions via OIDC (canary)
        run: |
          set -e
          for dir in packages/plugin-api packages/plugin-sdk packages/plugin-cli; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip $name@$version (already published)"; continue
            fi
            tgz="$RUNNER_TEMP/$(echo "$name" | sed 's#@##; s#/#-#')-${version}.tgz"
            ( cd "$dir" && pnpm pack --pack-destination "$RUNNER_TEMP" )
            echo "publish $name@$version via OIDC ($tgz)"
            npm publish "$tgz" --tag canary --access public
          done
